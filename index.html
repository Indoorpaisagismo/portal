<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --vd:#2C3E2D;--vm:#4A6741;--vc:#7A9E76;
    --bg:#F5F0E8;--bge:#E8E0D0;--terra:#A67C52;--terrac:#C49A6C;
    --branco:#FDFCF9;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'DM Sans',sans-serif;
    background:linear-gradient(160deg,#2C3E2D 0%,#1f2c20 100%);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    color:var(--branco);
  }
  .container{
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .logo{
    width:200px;
    max-width:60%;
    margin-bottom:48px;
  }
  .sub{
    font-size:13px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--vc);
    margin-bottom:48px;
    font-weight:300;
  }
  .apps{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .app-btn{
    display:flex;
    align-items:center;
    gap:16px;
    background:rgba(253,252,249,0.06);
    border:1px solid rgba(122,158,118,0.25);
    border-radius:18px;
    padding:22px 24px;
    text-decoration:none;
    color:var(--branco);
    transition:all .25s ease;
    cursor:pointer;
  }
  .app-btn:active{transform:scale(0.98);}
  .app-btn:hover{
    background:rgba(253,252,249,0.1);
    border-color:var(--vc);
  }
  .app-icone{
    width:54px;height:54px;
    border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-size:26px;
    flex-shrink:0;
  }
  .app-icone.hub{background:linear-gradient(135deg,var(--vm),var(--vc));}
  .app-icone.estoque{background:linear-gradient(135deg,var(--terra),var(--terrac));}
  .app-info{flex:1;}
  .app-nome{
    font-size:17px;
    font-weight:600;
    margin-bottom:3px;
  }
  .app-desc{
    font-size:12px;
    color:var(--vc);
    line-height:1.3;
  }
  .app-seta{
    color:var(--vc);
    font-size:20px;
  }
  .rodape{
    margin-top:48px;
    font-size:11px;
    color:rgba(122,158,118,0.6);
    text-align:center;
    letter-spacing:0.5px;
  }
</style>
</head>
